<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudless</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            width: 360px;
        }

        h1 {
            margin-bottom: 8px;
            font-size: 24px;
        }

        p {
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            background-color: #2a2a2a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #ff4444;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Cloudless</h1>
        <p>Your personal cloud storage</p>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post" action="/login">
            <input 
                type="text" 
                name="username" 
                placeholder="Username" 
                required
            />
            <input 
                type="password" 
                name="password" 
                placeholder="Password" 
                required
            />
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
